<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ver TikTok desde Cuba | Chambatina</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.header{border-bottom:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3);backdrop-filter:blur(10px);padding:16px}
.header-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#ec4899,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0}
.header h1{font-size:16px;font-weight:700}
.header p{font-size:11px;color:#888}
.container{max-width:600px;margin:0 auto;padding:20px 16px}
.search{display:flex;gap:8px;margin-bottom:6px}
.search input{flex:1;height:48px;padding:0 16px 0 40px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.08);color:#fff;font-size:14px;outline:none}
.search input:focus{border-color:rgba(236,72,153,.5);box-shadow:0 0 0 3px rgba(236,72,153,.15)}
.search input::placeholder{color:#666}
.search button{height:48px;padding:0 20px;border-radius:12px;border:none;background:linear-gradient(135deg,#ec4899,#8b5cf6);color:#fff;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.search button:disabled{opacity:.4;cursor:not-allowed}
.hint{font-size:11px;color:#555;margin-bottom:20px}
.loading{text-align:center;padding:60px 0}
.spinner{width:48px;height:48px;border:3px solid rgba(236,72,153,.2);border-top-color:#ec4899;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;margin-bottom:16px}
.card img.cover-img{width:100%;display:block;background:#111;min-height:200px;object-fit:cover}
.card-info{padding:16px}
.author{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.author-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;overflow:hidden}
.author-avatar img{width:100%;height:100%;object-fit:cover}
.card-info h2{font-size:15px;font-weight:600;margin-bottom:8px;line-height:1.4}
.card-info p.desc{font-size:13px;color:#ccc;line-height:1.5;white-space:pre-wrap}
.stats{display:flex;gap:16px;margin-top:12px;font-size:12px;color:#888}
.img-container{position:relative;background:#111;min-height:200px;display:flex;align-items:center;justify-content:center}
.img-container img{width:100%;height:auto;display:block}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:52px;border-radius:12px;border:none;background:#22c55e;color:#fff;font-weight:600;font-size:15px;cursor:pointer;text-decoration:none;margin-bottom:12px;box-shadow:0 8px 24px rgba(34,197,94,.25)}
.btn-wa:hover{background:#16a34a}
.btn-share{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:44px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;font-weight:500;font-size:13px;cursor:pointer;margin-bottom:24px}
.btn-share:hover{background:rgba(255,255,255,.1)}
.footer{text-align:center;padding:16px;font-size:11px;color:#444}
.footer span{color:#ec4899;font-weight:600}
.showcase-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.showcase-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s}
.showcase-item:hover{border-color:rgba(236,72,153,.4)}
.showcase-item .thumb{aspect-ratio:9/12;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.showcase-item .thumb img{width:100%;height:100%;object-fit:cover}
.showcase-item .thumb .ov{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:11px;color:#fff;font-weight:500}
.hidden{display:none}
</style>
</head>
<body>
<div class="header"><div class="header-inner"><div class="logo">T</div><div><h1>Ver TikTok desde Cuba</h1><p>Sin VPN, sin app — funciona desde cualquier lugar</p></div></div></div>
<div class="container">
  <div class="search"><input type="text" id="urlInput" placeholder="Pega el link de TikTok aqui..." /><button onclick="go()"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Ver</button></div>
  <p class="hint">Pega cualquier link: videos, fotos o perfiles de TikTok</p>
  <div id="content"></div>
  <div class="footer">Powered by <span>Chambatina</span> — Tu puente con Cuba<br>7523 Aloma Ave, Winter Park, FL 32792 · (786) 942-6904</div>
</div>
<script>
var TK='https://www.tikwm.com/api/',PX='https://www.chambatina.com/api/tiktok/proxy-image?url=',PH='17869426904';
var SHOWCASE=['https://www.tiktok.com/@chambatina/photo/7511890283794025758','https://www.tiktok.com/@chambatina'];
var ui=document.getElementById('urlInput'),ct=document.getElementById('content');
ui.addEventListener('keydown',function(e){if(e.key==='Enter')go()});

var p=new URLSearchParams(location.search),iu=p.get('url')||p.get('u')||p.get('link');
if(iu){ui.value=iu;go()}else{loadShowcase()}

function loadShowcase(){
  var h='<div class="showcase-grid">';
  for(var i=0;i<SHOWCASE.length;i++){
    var u=SHOWCASE[i],isP=u.match(/\/@[\w.]+$/);
    h+='<div class="showcase-item" onclick="loadUrl(\''+u+'\')"><div class="thumb" id="t'+i+'"><div style="color:#555;font-size:32px">🎵</div>'+(isP?'<div class="ov">@chambatina — Perfil</div>':'<div class="ov">Cargando...</div>')+'</div></div>';
  }
  h+='</div>';
  ct.innerHTML=h;
  for(var i=0;i<SHOWCASE.length;i++)loadThumb(SHOWCASE[i],i);
}

function loadThumb(url,idx){
  try{
    var f=new FormData();f.append('url',url);f.append('web','1');
    fetch(TK,{method:'POST',body:f}).then(function(r){return r.json()}).then(function(j){
      if(j.code!==0||!j.data)return;
      var d=j.data,img='';
      if(d.images&&d.images.length)img=d.images[0];
      else if(d.origin_cover)img='https://www.tikwm.com'+d.origin_cover;
      if(!img)return;
      var el=document.getElementById('t'+idx);if(!el)return;
      var title=d.title||'TikTok';
      var im=new Image();
      im.onload=function(){el.innerHTML='<img src="'+img+'" /><div class="ov">'+esc(title)+'</div>'};
      im.onerror=function(){
        var im2=new Image();
        im2.onload=function(){el.innerHTML='<img src="'+PX+encodeURIComponent(img)+'" /><div class="ov">'+esc(title)+'</div>'};
        im2.onerror=function(){el.innerHTML='<div style="color:#555;font-size:32px">🎵</div><div class="ov">'+esc(title)+'</div>'};
        im2.src=PX+encodeURIComponent(img);
      };
      im.src=img;
    }).catch(function(){});
  }catch(e){}
}

function loadUrl(url){ui.value=url;go()}

function go(){
  var url=ui.value.trim();if(!url)return;
  if(!url.startsWith('http'))url='https://'+url;
  ct.innerHTML='<div class="loading"><div class="spinner"></div><p style="color:#888;font-size:13px">Obteniendo contenido...</p></div>';

  var f=new FormData();f.append('url',url);f.append('web','1');f.append('hd','1');

  fetch(TK,{method:'POST',body:f}).then(function(r){return r.json()}).then(function(j){
    if(j.code!==0||!j.data)throw new Error('no data');
    var d=j.data,isP=d.images&&d.images.length>0,imgs=[];
    if(isP)imgs=imgs.concat(d.images);
    if(d.origin_cover)imgs.push('https://www.tikwm.com'+d.origin_cover);
    if(d.cover)imgs.push('https://www.tikwm.com'+d.cover);

    var au=d.author?(d.author.nickname||d.author.unique_id||''):'';
    var av=d.author&&d.author.avatar?'https://www.tikwm.com'+d.author.avatar:'';
    var desc=d.desc||'';
    if(d.content_desc&&d.content_desc.length)desc+=(desc?'\n':'')+d.content_desc.join('\n');
    var st=[];
    if(d.play_count)st.push('\u2764\uFE0F '+fN(d.play_count));
    if(d.comment_count)st.push('\uD83D\uDCAC '+fN(d.comment_count));
    if(d.share_count)st.push('\uD83D\uDD17 '+fN(d.share_count));

    var wt=encodeURIComponent('Vi esto en tu TikTok y me interesa:\n\n'+(d.title||'Video')+'\nAutor: @'+au+'\n\nLink: '+url);
    var wl='https://wa.me/'+PH+'?text='+wt;
    history.replaceState({},'','?url='+encodeURIComponent(url));

    var h='<div class="card">';
    if(imgs.length){
      h+='<div class="img-container" id="mi"><div style="text-align:center;padding:40px 0;color:#555"><div class="spinner" style="margin:0 auto 12px"></div><p style="font-size:12px">Cargando imagen...</p></div></div>';
    }
    h+='<div class="card-info">';
    if(au){
      h+='<div class="author"><div class="author-avatar">'+(av?'<img src="'+PX+encodeURIComponent(av)+'" onerror="this.parentNode.textContent=\''+esc(au[0]).toUpperCase()+'\'"/>':esc(au[0]).toUpperCase())+'</div><div><div style="font-size:13px;font-weight:600">@'+esc(au.replace('@',''))+'</div><div style="font-size:11px;color:#888">Creador de TikTok</div></div></div>';
    }
    if(d.title)h+='<h2>'+esc(d.title)+'</h2>';
    if(desc.trim())h+='<p class="desc">'+esc(desc.trim())+'</p>';
    if(st.length)h+='<div class="stats">'+st.join('  ')+'</div>';
    h+='</div></div>';
    h+='<a class="btn-wa" href="'+wl+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg> Lo quiero — Comprar por WhatsApp</a>';
    h+='<button class="btn-share" onclick="share()">Compartir</button>';
    ct.innerHTML=h;
    if(imgs.length)tryImgs(imgs);
  }).catch(function(err){
    console.error(err);
    var wt=encodeURIComponent('Vi un enlace de TikTok que me interesa:\n'+url);
    var wl='https://wa.me/'+PH+'?text='+wt;
    ct.innerHTML='<div class="card" style="text-align:center;padding:40px 20px"><div style="width:80px;height:80px;border-radius:16px;background:rgba(236,72,153,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 16px"><svg viewBox="0 0 24 24" fill="#ec4899" width="40" height="40"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 00-.79-.05A6.34 6.34 0 003.15 15.2a6.34 6.34 0 0010.86 4.46A6.34 6.34 0 0015.35 15V8.39a8.16 8.16 0 004.24 1.19V6.11a4.85 4.85 0 01-1-.42z"/></svg></div><h3 style="font-size:17px;margin-bottom:8px">Enlace de TikTok</h3><p style="font-size:12px;color:#888;word-break:break-all;margin-bottom:16px">'+esc(url)+'</p></div><a class="btn-wa" href="'+wl+'" target="_blank" rel="noopener">Me interesa — Contactar por WhatsApp</a>';
  });
}

function tryImgs(urls){
  var c=document.getElementById('mi');if(!c)return;
  var i=0;
  function nxt(){
    if(i>=urls.length){c.innerHTML='<div style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:8px">🎵</div><p style="color:#666;font-size:13px">Imagen no disponible</p></div>';return}
    var url=urls[i++],im=new Image();
    im.onload=function(){c.innerHTML='<img class="cover-img" src="'+url+'" />'};
    im.onerror=function(){
      var im2=new Image();
      im2.onload=function(){c.innerHTML='<img class="cover-img" src="'+PX+encodeURIComponent(url)+'" />'};
      im2.onerror=function(){nxt()};
      im2.src=PX+encodeURIComponent(url);
    };
    im.src=url;
  }
  nxt();
}

function share(){
  var u=location.origin+location.pathname+'?url='+encodeURIComponent(ui.value);
  if(navigator.share)navigator.share({title:'Ver TikTok desde Cuba',url:u});
  else{navigator.clipboard.writeText(u);var b=document.querySelector('.btn-share');if(b){b.textContent='¡Copiado!';setTimeout(function(){b.textContent='Compartir'},2000)}}
}

function fN(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n)}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
</script>
</body>
</html>
